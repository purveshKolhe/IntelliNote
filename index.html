<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IntelliNote - Local-First Microsoft Loop Clone</title>
    <meta name="description" content="IntelliNote is a premium local-first documentation tool matching Microsoft Loop. Build workspaces, organize chapters, write with Markdown commands, and highlight code offline." />
    <!-- KaTeX for math equations support -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  </head>
  <body>
    <div id="app">
      <!-- Primary Sidebar (Left-most panel) -->
      <aside id="sidebar-primary" class="loop-primary-sidebar">
        <div class="loop-logo-area">
          <div style="display:flex; align-items:center; gap: 8.4px;">
            <div class="loop-logo-icon">I</div>
            <h1 class="loop-logo-text">IntelliNote</h1>
          </div>
        </div>
        <button id="btn-create-workspace" class="create-new-btn">
          <span>＋</span><span class="btn-text">Create new</span>
        </button>
        <nav class="primary-nav-list" aria-label="Main Navigation">
          <button id="btn-collapse-sidebar" class="nav-item collapse-nav-item" title="Collapse Sidebar">
            <span class="nav-item-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21L5 21C3.89543 21 3 20.1046 3 19L3 5C3 3.89543 3.89543 3 5 3L19 3C20.1046 3 21 3.89543 21 5L21 19C21 20.1046 20.1046 21 19 21Z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M7.25 10L5.5 12L7.25 14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M9.5 21V3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </span> <span class="nav-item-text">Collapse</span>
          </button>
          <button id="btn-nav-search" class="nav-item">
            <span class="nav-item-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 17L21 21"></path>
                <path d="M3 11C3 15.4183 6.58172 19 11 19C13.213 19 15.2161 18.1015 16.6644 16.6493C18.1077 15.2022 19 13.2053 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11Z"></path>
              </svg>
            </span> <span class="nav-item-text">Search</span>
          </button>
          <button id="btn-nav-notifications" class="nav-item">
            <span class="nav-item-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8.4C18 6.70261 17.3679 5.07475 16.2426 3.87452C15.1174 2.67428 13.5913 2 12 2C10.4087 2 8.88258 2.67428 7.75736 3.87452C6.63214 5.07475 6 6.70261 6 8.4C6 15.8667 3 18 3 18H21C21 18 18 15.8667 18 8.4Z"></path>
                <path d="M13.73 21C13.5542 21.3031 13.3019 21.5547 12.9982 21.7295C12.6946 21.9044 12.3504 21.9965 12 21.9965C11.6496 21.9965 11.3054 21.9044 11.0018 21.7295C10.6982 21.5547 10.4458 21.3031 10.27 21"></path>
              </svg>
            </span> <span class="nav-item-text">Notifications</span>
          </button>
          <button id="btn-nav-plugins" class="nav-item">
            <span class="nav-item-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 13.1538V21"></path>
                <path d="M17 8.38452V11.1538C17 12.2583 16.1046 13.1538 15 13.1538H9C7.89543 13.1538 7 12.2583 7 11.1538V8.38452C7 7.27995 7.89543 6.38452 9 6.38452H15C16.1046 6.38452 17 7.27995 17 8.38452Z"></path>
                <path d="M15.3334 6.38462V3"></path>
                <path d="M8.66663 6.38462V3"></path>
              </svg>
            </span> <span class="nav-item-text">Plugins</span>
          </button>
          <button id="btn-nav-trash" class="nav-item">
            <span class="nav-item-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 9L18.005 20.3463C17.8369 21.3026 17.0062 22 16.0353 22H7.96474C6.99379 22 6.1631 21.3026 5.99496 20.3463L4 9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
                <path d="M21 6L15.375 6M3 6L8.625 6M8.625 6V4C8.625 2.89543 9.52043 2 10.625 2H13.375C14.4796 2 15.375 2.89543 15.375 4V6M8.625 6L15.375 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </span> <span class="nav-item-text">Recycle Bin</span>
          </button>
          <button id="btn-nav-import" class="nav-item">
            <span class="nav-item-icon">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
            </span> <span class="nav-item-text">Import Workspace</span>
          </button>
        </nav>
        <div id="sidebar-workspaces-container" class="sidebar-workspaces-list">
          <!-- Dynamic workspaces loaded from localStorage -->
        </div>
      </aside>

      <!-- Secondary Sidebar (Active Workspace Chapter hierarchy) -->
      <aside id="sidebar-secondary" class="loop-secondary-sidebar" style="display: none;">
        <!-- Dynamic active workspace context controls and chapter titles list -->
      </aside>

      <!-- Main Panel (Dashboard workspace grid OR document paper) -->
      <main id="main-pane" class="loop-main-pane">
        <!-- Dynamic contents loaded by main.js routing -->
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
